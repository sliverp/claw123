# ============================================
# Claw 配置文件模板
# ============================================
# 请复制此文件并重命名为 <slug>.yaml 放到 claws/ 目录下
# 所有字段说明如下：

# slug: 唯一标识符，用于 URL（必填，仅英文、数字、连字符）
slug: my-claw-project

# name: 项目显示名称（必填）
name: My Claw Project

# description: 项目简介（必填）
description: 一句话描述这个项目的功能和特色

# category: 项目类型（必填）
# 可选值: gateway | proxy | aggregator | tool | other
category: gateway

# homepage: 项目主页 URL（必填）
homepage: https://example.com

# github: GitHub 仓库地址（必填）
github: https://github.com/user/repo

# icon: 项目图标 URL（可选，建议 128x128 png）
icon: https://example.com/icon.png

# tags: 标签列表（可选）
tags:
  - openai-compatible
  - self-hosted
